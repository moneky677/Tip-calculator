ll)){document.getElementById("other1").textContent="pls enter a valid amount";return;}if(tip15.checked){tip=0.15;}else if(tip20.checked){tip=0.2;}else if(tip25.checked){tip=0.25;}else if(notip.checked){tip=0;}else{document.getElementById("other1").textContent="Pls select a tip option.";return;}total=Number(bill)+Number(bill*tip);document.getElementById("other1").textContent="";document.getElementById("total").textContent="Total: $"+String(total);document.getElementById("beforetip").textContent="Before tips: $"+String(bill);document.getElementById("tipdiv").textContent="Tip amount: $"+String(Number(tip*bill));}document.getElementById("submitbtn").onclick=result;</script></body></html>
